<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background: #198754;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        /* 2×2 grid that expands automatically */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 per row */
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 250px;          /* uniform size */
            object-fit: cover;      /* crops nicely */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <a href="/" class="back-btn">← Back to Home</a>

    <div class="gallery">

        <img src="https://jond25.github.io/ddynastia.com/IMG_6024.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6027.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6020.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6023.PNG" alt="">

        <img src="https://jond25.github.io/ddynastia.com/IMG_6019.PNG" alt="">

</html>
