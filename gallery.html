<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 18px;
            background: #198754;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        /* 2×2 grid on ALL devices */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        /* Hover zoom */
        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Lightbox overlay */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(255,255,255,0.3);
        }
    </style>
</head>

<body>

    <a href="/" class="back-btn">← Back to Home</a>

    <div class="gallery">

        <img src="https://jond25.github.io/ddynastia.com/IMG_6024.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6027.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6020.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6023.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6033.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6026.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6029.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6030.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6034.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6035.jpg" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6019.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6036.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6022.PNG" alt="">
        <img src="https://jond25.github.io/ddynastia.com/IMG_6025.jpg" alt="">

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="">
    </div>

    <script>
        // Lightbox functionality
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        document.querySelectorAll(".gallery img").forEach(img => {
            img.addEventListener("click", () => {
                lightboxImg.src = img.src;
                lightbox.style.display = "flex";
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.style.display = "none";
        });
    </script>

</body>
</html>
