<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD Tees – Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        a {
            color: #198754;
            text-decoration: none;
            font-weight: 600;
        }

        h1, h2 {
            color: #198754;
            margin-bottom: 16px;
        }

        /* Gallery grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 700px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1000px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .gallery-item {
            opacity: 0;
            transform: scale(0.96);
            animation: fadeInScale 0.4s forwards;
        }

        .gallery-item img {
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            display: block;
        }

        .gallery-item img:hover {
            transform: scale(1.03);
            transition: transform 0.2s ease;
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Load more button */
        .load-more-container {
            text-align: center;
            margin: 24px 0;
        }

        .load-more-btn {
            background: #198754;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .load-more-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        /* Video grid */
        .video-section {
            display: none;
            margin-top: 32px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 16px;
        }

        @media (min-width: 700px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .video-grid video {
            width: 100%;
            border-radius: 8px;
        }

        /* Lightbox */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .lightbox-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .lightbox-overlay.close-area {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="index.html">← Back to DD Tees Home</a>

    <h1>DD Tees Gallery</h1>

    <!-- IMAGE GALLERY -->
    <h2>Photos</h2>
    <div class="gallery-grid" id="galleryGrid">

        <!-- First 6 images (always visible) -->
        <div class="gallery-item"><img src="assets/images/71665990139__DAD1C520-1AE8-41AE-A52D-EED0F503C2EF.HEIC" alt=""></div>
        <div class="gallery-item"><img src="assets/images/71824541547__A95B280D-2C5D-4B60-B242-1F924EC7E0A3.HEIC" alt=""></div>
        <div class="gallery-item"><img src="assets/images/71927145808__94B9BCF7-B89D-419E-9669-FF33526FD93C.HEIC" alt=""></div>
        <div class="gallery-item"><img src="assets/images/71988030598__DF88AE0C-5D0F-42C0-9E21-F0AFA1C5E42E.HEIC" alt=""></div>
        <div class="gallery-item"><img src="assets/images/732AB41A-5616-4526-A186-DD96DB0D021B.HEIC" alt=""></div>
        <div class="gallery-item"><img src="assets/images/A54221F1-BA8F-4340-BE35-0E53AEA8063E.HEIC" alt=""></div>

        <!-- Remaining images (hidden initially, added via JS) -->
    </div>

    <div class="load-more-container">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
    </div>

    <!-- VIDEO SECTION -->
    <div class="video-section" id="videoSection">
        <h2>Videos</h2>
        <div class="video-grid">
            <video controls src="assets/images/IMG_2648.MOV"></video>
            <video controls src="assets/images/IMG_2770.MOV"></video>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox">
        <div class="close-area" id="lightboxClose">
            <img id="lightboxImg" src="" alt="">
        </div>
    </div>

    <script>
        // Remaining image paths
        const remainingImages = [
            "assets/images/B9499B61-56C9-44C3-A95A-A6BF86BDF7C1.HEIC",
            "assets/images/DFECBE0A-CBB8-4B57-9614-D7F6F8E0BF60.HEIC",
            "assets/images/IMG_2053.HEIC",
            "assets/images/IMG_2066.HEIC",
            "assets/images/IMG_2310.heic",
            "assets/images/IMG_2336.HEIC",
            "assets/images/IMG_2382.HEIC",
            "assets/images/IMG_2388.HEIC",
            "assets/images/IMG_2399.HEIC",
            "assets/images/IMG_2400.HEIC",
            "assets/images/IMG_2517.heic",
            "assets/images/IMG_2601.HEIC",
            "assets/images/IMG_2664.HEIC",
            "assets/images/IMG_2666.HEIC",
            "assets/images/IMG_2668.HEIC",
            "assets/images/IMG_2736.JPG",
            "assets/images/IMG_2738.HEIC",
            "assets/images/IMG_2739.HEIC",
            "assets/images/IMG_2740.HEIC",
            "assets/images/IMG_2771.HEIC",
            "assets/images/IMG_2772.HEIC",
            "assets/images/IMG_2779.HEIC",
            "assets/images/IMG_2790.HEIC",
            "assets/images/IMG_2817.HEIC",
            "assets/images/IMG_2818.HEIC",
            "assets/images/IMG_2853.HEIC",
            "assets/images/IMG_2937.HEIC",
            "assets/images/IMG_3025.HEIC",
            "assets/images/IMG_3077.HEIC",
            "assets/images/IMG_3109.HEIC",
            "assets/images/IMG_3258.JPG",
            "assets/images/IMG_3501.JPG",
            "assets/images/IMG_3504.HEIC",
            "assets/images/IMG_3513.HEIC",
            "assets/images/image000000.JPG"
        ];

        const galleryGrid = document.getElementById("galleryGrid");
        const loadMoreBtn = document.getElementById("loadMoreBtn");
        const videoSection = document.getElementById("videoSection");

        // Lightbox elements
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        const lightboxClose = document.getElementById("lightboxClose");

        // Attach lightbox to existing images
        function attachLightboxHandlers() {
            const imgs = document.querySelectorAll(".gallery-item img");
            imgs.forEach(img => {
                img.onclick = () => {
                    lightboxImg.src = img.src;
                    lightbox.style.display = "flex";
                };
            });
        }

        attachLightboxHandlers();

        lightboxClose.onclick = () => {
            lightbox.style.display = "none";
            lightboxImg.src = "";
        };

        // Load more: add remaining images + show videos
        loadMoreBtn.addEventListener("click", () => {
            remainingImages.forEach((src, index) => {
                const div = document.createElement("div");
                div.className = "gallery-item";
                div.style.animationDelay = (index * 0.03) + "s";

                const img = document.createElement("img");
                img.src = src;
                img.alt = "";

                div.appendChild(img);
                galleryGrid.appendChild(div);
            });

            attachLightboxHandlers();
            videoSection.style.display = "block";
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = "All Loaded";
        });
    </script>

</body>
</html>
